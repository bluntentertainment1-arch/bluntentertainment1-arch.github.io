<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Work Visa Jobs</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #ffffff;
    color: #000000;
  }

  /* Sticky Navbar */
  nav {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: center;
    background-color: #ffffff;
    padding: 15px 0;
    border-bottom: 2px solid #007bff;
    z-index: 1000;
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
    padding: 0;
  }

  nav ul li a {
    text-decoration: none;
    color: #007bff;
    font-weight: bold;
    padding: 8px 15px;
    border: 2px solid #007bff;
    border-radius: 5px;
    transition: 0.3s;
  }

  nav ul li a:hover {
    background-color: #007bff;
    color: #ffffff;
  }

  /* Hero / Landing Section */
  .hero {
    text-align: center;
    padding: 60px 20px 40px;
  }

  .hero img {
    width: 150px;
    height: auto;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .hero h1 {
    color: #007bff;
    margin-bottom: 20px;
  }

  .hero p {
    font-size: 1.1rem;
    margin-bottom: 30px;
  }

  .hero .buttons a {
    display: inline-block;
    margin: 10px;
    text-decoration: none;
    color: #ffffff;
    background-color: #007bff;
    padding: 12px 25px;
    border-radius: 6px;
    font-weight: bold;
    transition: 0.3s;
  }

  .hero .buttons a:hover {
    background-color: #0056b3;
  }

  /* Footer */
  footer {
    background-color: #ffffff;
    color: #007bff;
    text-align: center;
    padding: 20px;
    border-top: 2px solid #007bff;
  }

  footer nav ul {
    justify-content: center;
    gap: 15px;
    padding-bottom: 10px;
    display: flex;
    list-style: none;
    margin: 0;
  }

  footer nav ul li a {
    color: #007bff;
    border: 1px solid #007bff;
    padding: 6px 12px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
  }

  footer nav ul li a:hover {
    background-color: #007bff;
    color: #ffffff;
  }

  @media (max-width: 768px) {
    nav ul {
      flex-wrap: wrap;
      gap: 10px;
    }
    .hero img {
      width: 120px;
    }
  }
</style>
</head>
<body>

<!-- Navbar -->
<nav>
  <ul>
    <li><a href="https://bluntentertainment1-arch.github.io/globalworkvisajobs/">Home</a></li>
    <li><a href="https://bluntentertainment1-arch.github.io/globalworkvisajobs/about">About Us</a></li>
    <li><a href="https://bluntentertainment1-arch.github.io/globalworkvisajobs/privacy">Privacy Policy</a></li>
  </ul>
</nav>

<!-- Hero Section -->
<div class="hero">
  <img src="https://i.ibb.co/s9pxG7yM/IMG-1125.jpg" alt="App Icon">
  <h1>Global Work Visa Jobs</h1>
  <p>Discover verified job opportunities abroad. Find positions that may offer work visa sponsorship and start your international career today!</p>
  <div class="buttons">
    <a href="https://apps.apple.com/app/idYOUR_APP_ID_HERE">Download App</a>
    <a href="https://globalworkvisajobs.com">Browse Jobs</a>
  </div>
</div>

<!-- Footer -->
<footer>
  <nav>
    <ul>
      <li><a href="https://bluntentertainment1-arch.github.io/globalworkvisajobs/">Home</a></li>
      <li><a href="https://bluntentertainment1-arch.github.io/globalworkvisajobs/about">About Us</a></li>
      <li><a href="https://bluntentertainment1-arch.github.io/globalworkvisajobs/privacy">Privacy Policy</a></li>
    </ul>
  </nav>
  <p>© 2026 Global Work Visa Jobs</p>
</footer>

</body>
</html>
