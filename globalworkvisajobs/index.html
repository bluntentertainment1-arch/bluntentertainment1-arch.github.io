<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Work Visa Jobs</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #000000;
    }

    /* Navbar */
    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      background-color: #ffffff;
      padding: 10px 20px;
      border-bottom: 2px solid #007bff;
    }

    nav .logo img {
      height: 60px;
      width: auto;
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      text-decoration: none;
      color: #007bff;
      padding: 8px 15px;
      border-radius: 5px;
      transition: 0.3s;
      font-weight: bold;
      border: 2px solid #007bff;
    }

    nav ul li a:hover {
      background-color: #007bff;
      color: #ffffff;
    }

    /* Landing Section */
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 20px;
      text-align: center;
    }

    .landing img {
      max-width: 150px;
      width: 100%;
      height: auto;
      margin-bottom: 20px;
    }

    .landing h1 {
      font-size: 2.2em;
      color: #007bff;
      margin-bottom: 20px;
    }

    .landing p {
      font-size: 1.1em;
      margin-bottom: 30px;
    }

    .landing .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
    }

    .landing .buttons a {
      text-decoration: none;
      background-color: #007bff;
      color: #ffffff;
      padding: 12px 25px;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .landing .buttons a:hover {
      background-color: #0056b3;
    }

    /* Footer */
    footer {
      background-color: #ffffff;
      color: #007bff;
      text-align: center;
      padding: 20px;
      border-top: 2px solid #007bff;
    }

    footer nav ul {
      justify-content: center;
      gap: 10px;
      padding-bottom: 10px;
      display: flex;
      flex-wrap: wrap;
      list-style: none;
      margin: 0;
    }

    footer nav ul li a {
      color: #007bff;
      border: 1px solid #007bff;
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    footer nav ul li a:hover {
      background-color: #007bff;
      color: #ffffff;
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav ul {
        flex-direction: column;
        width: 100%;
      }
      .landing h1 {
        font-size: 1.8em;
      }
      .landing p {
        font-size: 1em;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="logo">
      <img src="https://i.ibb.co/s9pxG7yM/IMG-1125.jpg" alt="Global Work Visa Jobs Logo">
    </div>
    <ul>
      <li><a href="https://bluntentertainment1-arch.github.io/globalworkvisajobs/">Home</a></li>
      <li><a href="https://bluntentertainment1-arch.github.io/globalworkvisajobs/about">About Us</a></li>
      <li><a href="https://bluntentertainment1-arch.github.io/globalworkvisajobs/privacy">Privacy Policy</a></li>
    </ul>
  </nav>

  <!-- Landing Section -->
  <section class="landing">
    <img src="https://i.ibb.co/s9pxG7yM/IMG-1125.jpg" alt="App Icon">
    <h1>Global Work Visa Jobs</h1>
    <p>Discover verified international job opportunities and easily access work visa sponsored listings.</p>
    <div class="buttons">
      <a href="https://apps.apple.com/app/idYOUR_APP_ID" target="_blank">Download on App Store</a>
      <a href="https://globalworkvisajobs.com" target="_blank">Browse Jobs</a>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <nav>
      <ul>
        <li><a href="https://bluntentertainment1-arch.github.io/globalworkvisajobs/">Home</a></li>
        <li><a href="https://bluntentertainment1-arch.github.io/globalworkvisajobs/about">About Us</a></li>
        <li><a href="https://bluntentertainment1-arch.github.io/globalworkvisajobs/privacy">Privacy Policy</a></li>
      </ul>
    </nav>
    <p>© 2026 Global Work Visa Jobs</p>
  </footer>

</body>
</html>
